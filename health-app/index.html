<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        label {
            display: flex;
            flex-direction: column;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            padding: 10px 12px;
            margin-top: 5px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .results-section {
            margin-top: 30px;
        }

        .results-section h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
            text-align: center;
        }

        .result {
            padding: 12px 15px;
            margin: 8px 0;
            border-left: 4px solid #ddd;
            border-radius: 4px;
            background: #f9f9f9;
            font-weight: 600;
            font-size: 14px;
        }

        .sample {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #f0f4ff;
            border-radius: 8px;
            border: 2px dashed #667eea;
        }

        .sample h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .health-score-label {
            color: #555;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }

        #health-score-container {
            background: #e0e0e0;
            border-radius: 10px;
            height: 30px;
            overflow: hidden;
        }

        #health-score {
            background: linear-gradient(90deg, #22c55e 0%, #16a34a 100%);
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💓 Health Monitor</h1>
        
        <div class="form-group">
            <label>Systolic BP (mmHg)
                <input type="number" id="sys" placeholder="120" min="0" max="300">
            </label>
            <label>Diastolic BP (mmHg)
                <input type="number" id="dia" placeholder="80" min="0" max="300">
            </label>
        </div>

        <div class="form-group">
            <label>Heart Rate (bpm)
                <input type="number" id="heart-rate" placeholder="70" min="0" max="200">
            </label>
            <label>Respiratory Rate (bpm)
                <input type="number" id="respiratory" placeholder="16" min="0" max="50">
            </label>
        </div>

        <div class="form-group">
            <label>Temperature (°C)
                <input type="number" id="temperature" placeholder="37" min="35" max="42" step="0.1">
            </label>
            <label>O2 Saturation (%)
                <input type="number" id="os" placeholder="98" min="0" max="100">
            </label>
        </div>
        
        <button onclick="updateReading()">Update Reading</button>
        
        <div class="results-section">
            <h2>📊 Results</h2>
            <div class="result">Blood Pressure: --</div>
            <div class="result">Heart Rate: --</div>
            <div class="result">Respiratory Rate: --</div>
            <div class="result">Temperature: --</div>
            <div class="result">O2 Saturation: --</div>
        </div>
        
        <div class="sample">
            <h3>Health Score</h3>
            <div class="health-score-label">Overall Health Status</div>
            <div id="health-score-container">
                <div id="health-score">100%</div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
